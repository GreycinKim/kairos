services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kairos
      POSTGRES_PASSWORD: kairos
      POSTGRES_DB: kairos
    ports:
      # 5433 avoids clashing with a local Postgres already bound to 5432
      - "5433:5432"
    volumes:
      - kairos_pg:/var/lib/postgresql/data

volumes:
  kairos_pg:
