# Render Blueprint: API + Postgres. After deploy, set Vercel `VITE_API_BASE_URL` to `https://<this-service>.onrender.com/api`.
# Apply: Dashboard → New → Blueprint → connect repo (or `render blueprint apply`).

databases:
  - name: kairos-db
    databaseName: kairos
    user: kairos

services:
  - type: web
    name: kairos-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kairos-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
